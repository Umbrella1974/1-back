plan_id: fast_debug
description: Fast timing plan for haptic pipeline debug only; not for formal experiments.
random_seed: 123

timing:
  contact_onset_delay_ms: [0, 100]
  inter_event_gap_ms: [50, 100]
  refractory_ms: 1000

events:
  - name: contact
    modality: vibration
    command_label: contact_enter
    command_id: 1
    duration_ms: 150
    trigger_zone: open_zone
    onset_delay_ms: [0, 100]

  - name: slip
    modality: vibration
    command_label: slip_start
    command_id: 3
    duration_ms: 800
    trigger_zone: closed_zone
    onset_gap_after_previous_ms: [50, 100]

  - name: left
    modality: matrix
    channel_list: [1, 2, 3]
    duration_ms: 800
    trigger_zone: closed_zone
    onset_gap_after_previous_ms: [50, 100]

  - name: right
    modality: matrix
    channel_list: [5, 6, 7]
    duration_ms: 800
    trigger_zone: closed_zone
    onset_gap_after_previous_ms: [50, 100]

  - name: release
    modality: vibration
    command_label: contact_exit
    command_id: 2
    duration_ms: 150
    trigger_zone: closed_zone
    onset_gap_after_previous_ms: [50, 100]

zones:
  open_zone:
    lower: auto_a
    upper: auto_max
  closed_zone:
    lower: auto_min
    upper: auto_a
