plan_id: plan_001
description: Contact first, then slip-left-right, release last.
random_seed: 123

timing:
  contact_onset_delay_ms: [5000, 10000]
  inter_event_gap_ms: [5000, 10000]
  refractory_ms: 3000

events:
  - name: contact
    modality: vibration
    command_label: contact_enter
    command_id: 1
    duration_ms: 1500
    trigger_zone: open_zone
    onset_delay_ms: [7000, 10000]

  - name: slip
    modality: vibration
    command_label: slip_start
    command_id: 3
    duration_ms: 1000
    trigger_zone: closed_zone
    onset_gap_after_previous_ms: [6000, 10000]

  - name: left
    modality: matrix
    channel_list: [1, 2, 3]
    duration_ms: 1000
    trigger_zone: closed_zone
    onset_gap_after_previous_ms: [6000, 10000]

  - name: right
    modality: matrix
    channel_list: [5, 6, 7]
    duration_ms: 1000
    trigger_zone: closed_zone
    onset_gap_after_previous_ms: [6000, 10000]

  - name: release
    modality: vibration
    command_label: contact_exit
    command_id: 2
    duration_ms: 1500
    trigger_zone: closed_zone
    onset_gap_after_previous_ms: [6000, 10000]

zones:
  open_zone:
    lower: auto_a
    upper: auto_max
  closed_zone:
    lower: auto_min
    upper: auto_a
