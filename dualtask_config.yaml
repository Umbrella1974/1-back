session:
  session_id_prefix: pinch_haptic_1back
  output_root: outputs
  participant_id: ""
  condition_id: ""
  duration_s: 60
  haptic_plan_config: haptic_plan_config_example.yaml
  end_policy: stop_on_haptic_release
  allow_multiple_haptic_trials: false
  finish_active_haptic_before_exit: true

manus:
  tcp_host: 127.0.0.1
  tcp_port: 8888
  require_tracker: false
  save_raw_frames: true

pinch:
  thumb_node_id: 4
  target_finger_node_id: 14

calibration:
  open_hand_duration_s: 3.0
  pinch_hand_duration_s: 3.0
  threshold_ratio: 0.65
  min_valid_frames: 30
  min_distance_range: 0.02
  min_distance_range_ratio: 0.15

haptic:
  vibration_enabled: false
  matrix_enabled: false
  visual_text_cue_enabled: false
  max_queue_size: 128
  matrix_latest_only: true

vibration_tcp:
  enabled: false
  required: false
  host: 192.168.x.y
  port: 12346
  connect_timeout_s: 2.0
  send_timeout_s: 0.2

matrix_tcp:
  enabled: false
  required: false
  host: 192.168.x.y
  port: 12345
  connect_timeout_s: 2.0
  send_timeout_s: 0.2

haptic_defaults:
  vibration_duration_ms: [150, 300]
  matrix_duration_ms: [500, 1000]
  inter_event_gap_ms: [300, 1000]
  contact_onset_delay_ms: [500, 2000]
  release_duration_ms: [150, 300]

haptic_feedback_display:
  mode: console
  print_on_emit: true

haptic_debug:
  print_zone_transitions: false
  print_scheduler_events: true

sync:
  avoid_haptic_on_digit_onset: true
  digit_onset_guard_ms: 150
  max_haptic_delay_ms: 500
  if_cannot_avoid: log_warning_and_send
